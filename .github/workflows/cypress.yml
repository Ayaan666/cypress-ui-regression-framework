name: Cypress Smoke Tests

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Dependencies
        run: npm ci

      - name: Run Smoke Tests
        run: npx cypress run --spec "cypress/e2e/smoke/**/*.cy.ts"